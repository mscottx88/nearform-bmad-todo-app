# nginx config for the Pond Todo SPA.
#
# Two responsibilities:
#   1. Serve the Vite static bundle with SPA fallback (any unknown
#      path returns index.html so client-side routing works).
#   2. Proxy /api/* to the `backend` compose service so the SPA can
#      reach the FastAPI backend without CORS gymnastics.
#
# The agent SSE endpoint streams chat tokens — disable proxy buffering
# on /api/ so the browser sees tokens as they arrive instead of
# nginx batching them into ~4KB chunks.

server {
    listen 80;
    server_name _;

    # Increase request timeouts for the SSE-style agent endpoint.
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    # Static SPA bundle.
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS lives at 127.0.0.11. Without an explicit
    # `resolver` directive AND a variable in `proxy_pass`, nginx
    # resolves `backend` exactly once at config-load time and caches
    # the IP forever. A backend container restart (OOM-kill, redeploy,
    # `docker restart backend`) yields a new IP on the compose
    # network, and nginx keeps trying the stale one — the SPA returns
    # 502 on every /api/* call until nginx is ALSO restarted. The
    # variable form below makes nginx re-resolve per request, with a
    # 10s positive-cache TTL.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Backend API proxy. `backend` is the docker-compose service name
    # (and DNS hostname inside the compose network).
    location /api/ {
        # Variable form forces lazy DNS resolution — see resolver note above.
        set $upstream_backend "backend";
        proxy_pass http://$upstream_backend:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: tokens arrive as separate `data:` lines and the
        # browser must not wait for nginx to fill a buffer.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        chunked_transfer_encoding on;

        # `proxy_buffering off` alone is not enough — `nginx:alpine`'s
        # default config has `gzip on`, and gzip needs to fill its
        # compression window before flushing, which re-introduces
        # buffering at a different layer. Force gzip off for the
        # streaming path so each `data:` line reaches the browser
        # immediately.
        gzip off;
        gzip_proxied off;
    }

    # SPA fallback: any unknown path → index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache the hashed Vite asset bundle.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
