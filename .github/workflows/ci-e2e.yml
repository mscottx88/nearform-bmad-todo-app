name: CI E2E

# Story 1.5: Playwright + axe-core gate over the full docker-compose
# stack. Triggers on changes to anything that could affect a
# user-facing flow — frontend, backend, infra, or this workflow itself.

on:
  push:
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'docker-compose.yml'
      - '.github/workflows/ci-e2e.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'docker-compose.yml'
      - '.github/workflows/ci-e2e.yml'

jobs:
  e2e:
    runs-on: ubuntu-latest
    # 10-minute hard cap (story AC 7). The current run is well under
    # that — see Dev Agent Record for measured timings.
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Resolve Playwright version
        id: pw-version
        working-directory: frontend
        # The browser cache key is keyed on the installed Playwright
        # version. Newer Playwright bundles a different browser
        # snapshot so we'd otherwise re-download every CI run.
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers (chromium only)
        # `--with-deps` pulls Chromium + the OS-level libs Chromium
        # needs (libnss, libxkb, etc.) on a fresh ubuntu-latest runner.
        # Skip the binary download when restored from cache; --with-deps
        # is still safe to re-run since it only no-ops if already present.
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build + start docker-compose stack
        # `--build` ensures the runner uses freshly built images
        # rather than any leftover from a layer cache. The compose
        # file has the backend wait on the db healthcheck, so by the
        # time `up -d` returns the stack is reachable.
        run: docker compose up -d --build

      - name: Wait for stack readiness
        # Three probes per iteration:
        #   1. SPA root via nginx (`:8080/`) — proves nginx is up
        #      AND the static bundle landed.
        #   2. Backend direct via host port (`:8000/api/todos`) —
        #      proves uvicorn is responding and migrations applied.
        #   3. **Proxy path** (`:8080/api/todos`) — proves nginx
        #      successfully resolves the `backend` upstream and the
        #      SPA's runtime API path actually works. This catches
        #      the case where the backend is up but nginx's DNS
        #      hasn't seen it yet (or vice versa).
        # We also gate-check `docker compose ps` for any container
        # that has exited or entered an unhealthy state, so a crash-
        # looping backend doesn't false-green the readiness gate.
        run: |
          for i in $(seq 1 30); do
            if docker compose ps --status exited --quiet | grep -q .; then
              echo "a container has exited — aborting wait"
              docker compose ps
              docker compose logs --tail=200
              exit 1
            fi
            if curl --silent --fail http://localhost:8080/ > /dev/null \
               && curl --silent --fail http://localhost:8000/api/todos > /dev/null \
               && curl --silent --fail http://localhost:8080/api/todos > /dev/null; then
              echo "stack ready (SPA + backend + nginx proxy all responding)"
              exit 0
            fi
            echo "waiting for stack ($i)…"
            sleep 2
          done
          echo "stack did not become ready in 60s"
          docker compose ps
          docker compose logs --tail=200
          exit 1

      - name: Run Playwright + axe
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:8080
          BACKEND_URL: http://localhost:8000
          CI: 'true'
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Compose logs on failure
        if: failure()
        run: docker compose logs --tail=400

      - name: Tear down compose
        if: always()
        run: docker compose down -v
