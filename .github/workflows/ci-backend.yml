name: CI Backend

on:
  push:
    paths:
      - 'backend/**'
      # Root-level infra that affects the backend integration tests:
      - 'docker-compose.yml'
      - 'Makefile'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - 'Makefile'
      - '.github/workflows/ci-backend.yml'

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: todo_pond_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/todo_pond_test

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy .

      - name: Apply database migrations
        # Required before pytest — the test suite seeds and queries real
        # rows (test_search_service, test_schema_constraints, etc.) and
        # expects the schema landed in migrations/versions/* to be in
        # place. Without this step the first test fails with "relation
        # 'todos' does not exist".
        run: uv run python -m alembic upgrade head

      - name: Test (with coverage gate)
        # Coverage threshold (70%) is enforced via fail_under in
        # backend/pyproject.toml ([tool.coverage.report]). The CLI flag
        # below activates pytest-cov; the threshold itself comes from
        # config so a future bump only needs one edit.
        run: uv run pytest --cov=src --cov-report=term-missing
