repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-check
        entry: bash -c 'cd backend && uv run ruff check .'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

      - id: ruff-format
        name: ruff-format
        entry: bash -c 'cd backend && uv run ruff format --check .'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: bash -c 'cd backend && uv run mypy .'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

      - id: pytest
        name: pytest
        # DATABASE_URL override points pytest at the test DB so the
        # `_clean_db` fixture doesn't wipe the developer's dev data
        # on every commit. The `_safeguard_test_database` session
        # fixture refuses to run if the DB name doesn't contain
        # "test"; that guard is what surfaced this bug. Matches
        # `make test` and ci-backend.yml.
        entry: bash -c 'cd backend && DATABASE_URL="postgresql+psycopg://postgres:postgres@localhost:5432/todo_pond_test" uv run pytest'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false
        stages: [pre-commit]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
